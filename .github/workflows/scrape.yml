name: 🕷️ Daily Regulatory Scraping

on:
  schedule:
    - cron: '0 9 * * 1-5'   # Lunes a viernes a las 09:00 UTC (06:00 Chile / 04:00 Colombia)
  workflow_dispatch:          # Ejecución manual desde la UI de GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit and push new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/regulatory_items.json
          if git diff --staged --quiet; then
            echo "No new regulatory items found."
          else
            git commit -m "data: update regulatory_items.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Trigger AI analysis
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            });
