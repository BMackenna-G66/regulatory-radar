name: 🤖 AI Regulatory Analysis

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["🕷️ Daily Regulatory Scraping"]
    types: [completed]

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run AI analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: python scripts/analyzer.py

      - name: Commit and push analysis results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ai_analysis.json
          if git diff --staged --quiet; then
            echo "No new analysis generated."
          else
            git commit -m "data: update ai_analysis.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
